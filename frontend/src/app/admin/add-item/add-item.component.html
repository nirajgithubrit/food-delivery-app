<section class="mx-auto max-w-3xl px-4 py-6 sm:px-6 sm:py-8">
  <div class="mb-6 flex flex-col gap-3 border-b border-slate-200/80 pb-4 dark:border-slate-800 sm:flex-row sm:items-end sm:justify-between">
    <div class="min-w-0">
      <a
        routerLink="/admin/orders"
        class="focus-ring inline-flex items-center gap-1.5 rounded-lg px-1.5 py-1 -ml-1.5 text-xs font-semibold text-slate-600 transition hover:bg-slate-100 hover:text-brand-600 dark:text-slate-300 dark:hover:bg-slate-800 dark:hover:text-brand-400 no-underline"
      >
        <svg
          class="h-3.5 w-3.5"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M19 12H5" />
          <polyline points="12 19 5 12 12 5" />
        </svg>
        Back to orders
      </a>

      <p class="mt-2 text-[10px] font-semibold uppercase tracking-wider text-brand-600">
        Menu
      </p>
      <p class="font-display text-3xl font-bold text-slate-900 dark:text-white">
        Add food item
      </p>
      <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">
        Create dishes with clean details so they are easier to discover in customer search.
      </p>
    </div>
  </div>

  <div class="rounded-2xl border border-slate-200/80 bg-white p-4 shadow-sm dark:border-slate-700 dark:bg-slate-900 sm:p-5">
    <div class="space-y-3">
      <div>
        <label class="mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-500">Item name</label>
        <input
          [(ngModel)]="item.name"
          placeholder="Example: Paneer Tikka Roll"
          class="focus-ring h-11 w-full rounded-xl border border-slate-200 bg-white px-3.5 text-sm dark:border-slate-600 dark:bg-slate-950/50"
        />
      </div>

      <div>
        <label class="mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-500">Price</label>
        <input
          [(ngModel)]="item.price"
          type="number"
          min="1"
          placeholder="Example: 149"
          class="focus-ring h-11 w-full rounded-xl border border-slate-200 bg-white px-3.5 text-sm dark:border-slate-600 dark:bg-slate-950/50"
        />
      </div>

      <div>
        <label class="mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-500">Image URL</label>
        <input
          [(ngModel)]="item.image"
          placeholder="https://example.com/image.jpg"
          class="focus-ring h-11 w-full rounded-xl border border-slate-200 bg-white px-3.5 text-sm dark:border-slate-600 dark:bg-slate-950/50"
        />
      </div>
    </div>

    <button
      type="button"
      class="focus-ring mt-5 inline-flex w-full items-center justify-center gap-2 rounded-xl bg-gradient-to-r from-brand-500 to-orange-500 px-4 py-2.5 text-sm font-semibold text-white shadow-md transition-all duration-200 ease-out hover:shadow-lift hover:brightness-[1.03] active:scale-[0.98] min-h-[2.75rem]"
      (click)="addItem()"
    >
      Add item
    </button>
  </div>
</section>
