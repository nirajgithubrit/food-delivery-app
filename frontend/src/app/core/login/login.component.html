<div
  class="relative flex min-h-dvh items-center justify-center overflow-hidden px-3 py-8 sm:px-4 sm:py-10"
>
  <div
    class="pointer-events-none absolute inset-0 bg-[radial-gradient(ellipse_at_20%_0%,rgba(249,115,22,0.14),transparent_50%),radial-gradient(ellipse_at_100%_30%,rgba(59,130,246,0.1),transparent_45%),radial-gradient(ellipse_at_50%_100%,rgba(16,185,129,0.08),transparent_50%)] dark:opacity-60"
  ></div>

  <div
    class="relative w-full max-w-[22rem] rounded-2xl border border-white/60 bg-white/90 p-5 shadow-lift backdrop-blur-xl dark:border-slate-700/70 dark:bg-slate-900/85 sm:max-w-md sm:rounded-3xl sm:p-7"
  >
    <div class="text-center">
      <p class="text-[10px] font-semibold uppercase tracking-[0.2em] text-brand-600">
        LocalBite
      </p>
      <h1 class="mt-1.5 font-display text-xl font-bold text-slate-900 dark:text-white sm:text-2xl">
        Sign in
      </h1>
      <p class="mt-1 text-xs text-slate-500 dark:text-slate-400">
        Pick a role to continue
      </p>
    </div>

    <div
      class="mt-5 grid grid-cols-3 gap-0.5 rounded-xl bg-slate-100/90 p-0.5 dark:bg-slate-800/90"
      role="tablist"
      aria-label="Login role"
    >
      <button
        type="button"
        role="tab"
        [attr.aria-selected]="role() === 'customer'"
        class="focus-ring rounded-lg py-2 text-[11px] font-semibold transition sm:text-xs"
        [class.bg-white]="role() === 'customer'"
        [class.shadow-sm]="role() === 'customer'"
        [class.dark:bg-slate-900]="role() === 'customer'"
        (click)="setRole('customer')"
      >
        Customer
      </button>
      <button
        type="button"
        role="tab"
        [attr.aria-selected]="role() === 'admin'"
        class="focus-ring rounded-lg py-2 text-[11px] font-semibold transition sm:text-xs"
        [class.bg-white]="role() === 'admin'"
        [class.shadow-sm]="role() === 'admin'"
        [class.dark:bg-slate-900]="role() === 'admin'"
        (click)="setRole('admin')"
      >
        Admin
      </button>
      <button
        type="button"
        role="tab"
        [attr.aria-selected]="role() === 'delivery'"
        class="focus-ring rounded-lg py-2 text-[11px] font-semibold transition sm:text-xs"
        [class.bg-white]="role() === 'delivery'"
        [class.shadow-sm]="role() === 'delivery'"
        [class.dark:bg-slate-900]="role() === 'delivery'"
        (click)="setRole('delivery')"
      >
        Rider
      </button>
    </div>

    @if (role() === 'customer') {
      <div class="mt-5 space-y-3" role="tabpanel">
        @if (!otpSent()) {
          <div class="space-y-2.5">
            <label class="sr-only" for="cust-phone">Mobile number</label>
            <div
              class="flex h-11 items-stretch overflow-hidden rounded-xl border border-slate-200 bg-white focus-within:border-brand-500 focus-within:ring-2 focus-within:ring-brand-500/30 dark:border-slate-600 dark:bg-slate-950/50"
            >
              <span
                class="flex shrink-0 items-center bg-slate-50 px-3 text-sm font-medium text-slate-600 dark:bg-slate-800/60 dark:text-slate-300"
              >
                +91
              </span>
              <input
                id="cust-phone"
                [(ngModel)]="phone"
                inputmode="numeric"
                maxlength="10"
                placeholder="Mobile number"
                autocomplete="tel-national"
                class="h-full w-full bg-transparent px-3 text-sm outline-none"
              />
            </div>

            <button
              type="button"
              class="focus-ring mt-1 inline-flex w-full items-center justify-center gap-2 rounded-xl bg-emerald-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm transition-all duration-200 ease-out hover:bg-emerald-700 active:scale-[0.98] min-h-[2.75rem] disabled:cursor-not-allowed disabled:opacity-60"
              [disabled]="sendingOtp()"
              (click)="sendOTP()"
            >
              @if (sendingOtp()) {
                <span class="inline-block h-4 w-4 animate-spin rounded-full border-2 border-white/40 border-t-white" aria-hidden="true"></span>
                <span>Sending OTP…</span>
              } @else {
                <span>Send OTP</span>
              }
            </button>

            <p class="text-center text-[11px] text-slate-500 dark:text-slate-400">
              Solve the captcha after tapping Send OTP.
            </p>

            <div id="recaptcha" class="flex justify-center"></div>
          </div>
        } @else {
          <div class="space-y-2.5">
            <div
              class="flex items-center justify-between rounded-xl border border-emerald-200/80 bg-emerald-50 px-3 py-2 text-sm dark:border-emerald-900/60 dark:bg-emerald-950/40"
            >
              <div class="min-w-0">
                <p class="text-[10px] font-semibold uppercase tracking-wide text-emerald-700 dark:text-emerald-300">
                  OTP sent to
                </p>
                <p class="truncate font-mono text-sm font-semibold text-emerald-900 dark:text-emerald-100">
                  +91 {{ phone }}
                </p>
              </div>
              <button
                type="button"
                class="focus-ring shrink-0 rounded-lg px-2 py-1 text-xs font-semibold text-emerald-800 hover:bg-emerald-100 dark:text-emerald-200 dark:hover:bg-emerald-900/60"
                (click)="changeNumber()"
              >
                Change
              </button>
            </div>

            <label class="sr-only" for="cust-otp">One-time password</label>
            <input
              id="cust-otp"
              [(ngModel)]="otp"
              inputmode="numeric"
              maxlength="6"
              placeholder="Enter 6-digit OTP"
              autocomplete="one-time-code"
              class="focus-ring h-11 w-full rounded-xl border border-slate-200 bg-white px-3.5 text-center font-mono text-base tracking-[0.4em] dark:border-slate-600 dark:bg-slate-950/50"
            />

            <button
              type="button"
              class="focus-ring mt-1 inline-flex w-full items-center justify-center gap-2 rounded-xl bg-gradient-to-r from-brand-500 to-orange-500 px-4 py-2.5 text-sm font-semibold text-white shadow-md transition-all duration-200 ease-out hover:shadow-lift hover:brightness-[1.03] active:scale-[0.98] min-h-[2.75rem] disabled:cursor-not-allowed disabled:opacity-60"
              [disabled]="verifyingOtp()"
              (click)="verifyOTP()"
            >
              @if (verifyingOtp()) {
                <span class="inline-block h-4 w-4 animate-spin rounded-full border-2 border-white/40 border-t-white" aria-hidden="true"></span>
                <span>Verifying…</span>
              } @else {
                <span>Verify & continue</span>
              }
            </button>

            <button
              type="button"
              class="focus-ring w-full rounded-lg py-1.5 text-xs font-semibold text-slate-600 hover:text-brand-600 dark:text-slate-300 dark:hover:text-brand-400"
              (click)="resendOTP()"
            >
              Didn’t get the code? Resend OTP
            </button>
          </div>
        }
      </div>
    }

    @if (role() === 'admin') {
      <div class="mt-5 space-y-2.5" role="tabpanel">
        <label class="sr-only" for="adm-email">Email</label>
        <input
          id="adm-email"
          [(ngModel)]="email"
          type="email"
          autocomplete="username"
          placeholder="Email"
          class="focus-ring h-11 w-full rounded-xl border border-slate-200 bg-white px-3.5 text-sm dark:border-slate-600 dark:bg-slate-950/50"
        />
        <label class="sr-only" for="adm-pass">Password</label>
        <input
          id="adm-pass"
          [(ngModel)]="password"
          type="password"
          autocomplete="current-password"
          placeholder="Password"
          class="focus-ring h-11 w-full rounded-xl border border-slate-200 bg-white px-3.5 text-sm dark:border-slate-600 dark:bg-slate-950/50"
        />
        <button
          type="button"
          class="focus-ring mt-1 inline-flex w-full items-center justify-center gap-2 rounded-xl bg-slate-900 px-4 py-2.5 text-sm font-semibold text-white shadow-sm transition-all duration-200 ease-out hover:shadow-md active:scale-[0.98] min-h-[2.75rem] dark:bg-white dark:text-slate-900"
          (click)="adminLogin()"
        >
          Continue as admin
        </button>
      </div>
    }

    @if (role() === 'delivery') {
      <div class="mt-5 space-y-2.5" role="tabpanel">
        <label class="sr-only" for="del-name">Rider name</label>
        <input
          id="del-name"
          [(ngModel)]="name"
          placeholder="Full name"
          autocomplete="name"
          required
          class="focus-ring h-11 w-full rounded-xl border border-slate-200 bg-white px-3.5 text-sm dark:border-slate-600 dark:bg-slate-950/50"
        />

        <label class="sr-only" for="del-phone">Rider phone</label>
        <div
          class="flex h-11 items-stretch overflow-hidden rounded-xl border border-slate-200 bg-white focus-within:border-brand-500 focus-within:ring-2 focus-within:ring-brand-500/30 dark:border-slate-600 dark:bg-slate-950/50"
        >
          <span
            class="flex shrink-0 items-center bg-slate-50 px-3 text-sm font-medium text-slate-600 dark:bg-slate-800/60 dark:text-slate-300"
          >
            +91
          </span>
          <input
            id="del-phone"
            [(ngModel)]="phone"
            inputmode="numeric"
            maxlength="10"
            placeholder="Phone number"
            autocomplete="tel-national"
            required
            class="h-full w-full bg-transparent px-3 text-sm outline-none"
          />
        </div>

        <p class="text-[11px] text-slate-500 dark:text-slate-400">
          Both name and phone number are required.
        </p>

        <button
          type="button"
          class="focus-ring mt-1 inline-flex w-full items-center justify-center gap-2 rounded-xl bg-gradient-to-r from-brand-500 to-orange-500 px-4 py-2.5 text-sm font-semibold text-white shadow-md transition-all duration-200 ease-out hover:shadow-lift hover:brightness-[1.03] active:scale-[0.98] min-h-[2.75rem]"
          (click)="deliveryLogin()"
        >
          Go online
        </button>
      </div>
    }
  </div>
</div>
