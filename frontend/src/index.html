<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <title>Gir Gamthi</title>
    <base href="/"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
    <meta name="apple-mobile-web-app-title" content="Gir Gamthi"/>
    <link rel="apple-touch-icon" href="icons/icon-192x192.jpg"/>
    <link rel="icon" type="image/x-icon" href="favicon.jpg"/>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
    <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCeE-s4yTloqvacHp6cBjnsbQL48vKtP4U&amp;libraries=places&amp;loading=async"></script>

    <meta name="theme-color" content="#f97316"/>
    <meta name="gg-api-url" content="http://localhost:3000/api"/>
    <script src="branding-boot.js"></script>
  <style>
    #app-boot-splash {
      position: fixed;
      inset: 0;
      z-index: 2147483646;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #fff7ed 0%, #ffffff 42%, #f8fafc 100%);
    }
    #app-boot-splash.boot-splash--hide {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }
    @keyframes bootSplashPulse {
      0%,
      100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
    }
    .boot-splash-logo {
      border-radius: 22px;
      box-shadow: 0 12px 40px rgba(249, 115, 22, 0.28);
      animation: bootSplashPulse 1.25s ease-in-out infinite;
    }
  </style>
</head>
  <body class="mat-typography">
    <div id="app-boot-splash" aria-hidden="true">
      <img
        class="boot-splash-logo"
        src="icons/icon-192x192.jpg"
        width="96"
        height="96"
        alt=""
        decoding="async"
      />
      <p
        data-boot-title
        style="margin-top: 1.25rem; font-family: system-ui, sans-serif; font-weight: 700; color: #0f172a"
      >
        Gir Gamthi
      </p>
      <p style="margin-top: 0.35rem; font-size: 13px; color: #64748b">Starting up…</p>
    </div>
    <app-root></app-root>
    <noscript>Please enable JavaScript to continue using this application.</noscript>
</body>
</html>
