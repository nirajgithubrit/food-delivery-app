[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist/frontend/browser"

# Let the Angular service worker discover new builds (avoid stale ngsw.json in CDNs / PWA cache).
[[headers]]
  for = "/ngsw.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/ngsw-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
