# Default: production bundle (environment.prod.ts via `ng build`).
# Branch `Dev` (exact casing): hosted DEV bundle (environment.dev.ts).
# Context name must match the Git branch name — `Dev` is not the same as `dev`.

[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist/frontend/browser"

[context.Dev]
  command = "npm run build:dev"

# Let the Angular service worker discover new builds (avoid stale ngsw.json in CDNs / PWA cache).
[[headers]]
  for = "/ngsw.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/ngsw-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
